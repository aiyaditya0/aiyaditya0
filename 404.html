<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – FutureWithAi</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="shortcut icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-void: #050505;
      --primary: #ffb77f;
      --primary-container: #ff8a00;
      --text-white: #ffffff;
      --text-primary: #f3dfd1;
      --text-secondary: #ddc1ae;
      --text-muted: #a58c7b;
      --border-color: #232323;
      --border-hover: rgba(255, 138, 0, 0.4);
      --glow-primary: 0px 0px 20px rgba(255, 138, 0, 0.25);
      --glow-intense: 0px 0px 25px rgba(255, 138, 0, 0.4);
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
      --transition-smooth: 600ms cubic-bezier(.22,.61,.36,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      background-image: 
        radial-gradient(at 0% 0%, rgba(255, 138, 0, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(67, 55, 46, 0.15) 0px, transparent 50%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 24px;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Card ─── */
    .notfound-card {
      background: linear-gradient(135deg, rgba(27, 17, 10, 0.95) 0%, rgba(5, 5, 5, 0.98) 100%);
      border-radius: 28px;
      padding: 50px 40px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8), var(--glow-primary);
      border: 1px solid rgba(255, 138, 0, 0.15);
      position: relative;
      overflow: hidden;
      animation: cardSlideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .notfound-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-container), var(--primary));
    }

    /* ─── 404 Visual Icon ─── */
    .icon-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255, 138, 0, 0.1);
      border: 1px solid rgba(255, 138, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: bounceIn 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      box-shadow: var(--glow-primary);
      color: var(--primary-container);
    }

    @keyframes bounceIn {
      from { opacity:0; transform: scale(0); }
      to   { opacity:1; transform: scale(1); }
    }

    .error-code {
      font-family: var(--font-serif);
      font-size: 84px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #ff8a00, #ffb77f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      animation: fadeUp 0.5s 0.4s ease both;
    }

    .notfound-title {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-white);
      margin-bottom: 12px;
      animation: fadeUp 0.5s 0.5s ease both;
    }

    .notfound-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 36px;
      line-height: 1.6;
      animation: fadeUp 0.5s 0.6s ease both;
    }

    /* ─── CTA Buttons ─── */
    .cta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.5s 0.75s ease both;
    }

    .btn-home {
      flex: 1.2;
      min-width: 180px;
      background: var(--primary-container);
      color: var(--bg-void);
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: var(--transition-smooth);
      font-family: var(--font-sans);
      box-shadow: var(--glow-primary);
    }

    .btn-home:hover {
      transform: translateY(-2px);
      background: #ff9f24;
      box-shadow: var(--glow-intense);
    }

    .btn-support {
      flex: 1;
      min-width: 150px;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: var(--transition-smooth);
      font-family: var(--font-sans);
    }

    .btn-support:hover {
      border-color: var(--primary-container);
      color: var(--primary);
      transform: translateY(-2px);
    }

    @media (max-width: 500px) {
      .notfound-card { padding: 36px 20px 28px; }
      .notfound-title { font-size: 24px; }
      .error-code { font-size: 64px; }
      .cta-row { flex-direction: column; }
    }
  </style>

  <!-- Meta Pixel Code -->
  <script src="pixel-tracker.js" defer></script>
  <noscript>
    <img height="1" width="1" style="display:none" 
         src="https://www.facebook.com/tr?id=2550902175328844&ev=PageView&noscript=1"/>
  </noscript>
  <!-- End Meta Pixel Code -->
</head>
<body>

  <div class="page-wrapper">
    <!-- Logo -->
    <div style="margin-bottom:32px; animation: fadeUp 0.4s ease both;">
      <a href="index.html">
        <img src="primary-logo.png" alt="FutureWithAi Logo" style="height:144px; object-fit:contain;">
      </a>
    </div>

    <div class="notfound-card">

      <div class="icon-wrap">
        <i data-lucide="server-crash" style="width: 44px; height: 44px; stroke-width: 1.5;"></i>
      </div>

      <div class="error-code">404</div>
      <h1 class="notfound-title">Page Not Found</h1>
      <p class="notfound-subtitle">
        The page you are looking for does not exist, has been removed, or is temporarily unavailable.
      </p>

      <!-- Action Buttons -->
      <div class="cta-row">
        <a href="index.html" class="btn-home">
          <i data-lucide="home" style="width: 16px; height: 16px;"></i>
          Return Home
        </a>
        <a href="https://wa.me/917065815743?text=Hi%20Aditya%2C%20I%20hit%20a%20404%20error%20on%20FutureWithAi." target="_blank" class="btn-support">
          <i data-lucide="message-circle" style="width: 16px; height: 16px;"></i>
          Contact Support
        </a>
      </div>

    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();
  </script>
</body>
</html>
